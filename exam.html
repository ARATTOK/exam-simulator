<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SimuExam — Examen</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>📝</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="dashboard.html" class="nav-brand">
        <img src="logo.svg" alt="SimuExam"> SimuExam
      </a>
      <div class="nav-links">
        <button class="nav-link" id="themeToggle" onclick="toggleTheme()" title="Cambiar tema">🌙</button>
        <span class="nav-link user-info" id="userDisplay">👤 usuario</span>
        <button class="nav-link logout" onclick="confirmExit()">Salir</button>
      </div>
    </div>
  </nav>

  <div class="loading-center" id="loadingIndicator">
    <div class="spinner"></div>
    <p>Preparando examen...</p>
  </div>

  <div id="examContent" class="hidden">
    <div class="exam-container">
      <div class="exam-progress" id="examProgress">
        <div style="font-weight:700;font-size:0.9rem;white-space:nowrap;" id="progressLabel">0/0</div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
        <div class="exam-timer" id="timerDisplay">⏱ 00:00</div>
      </div>

      <div class="text-sm text-muted mb-4 text-center" id="cycleInfo">Ronda 1</div>

      <div class="question-card" id="questionCard">
        <div class="question-number" id="questionNumber">Pregunta 1</div>
        <div class="question-text" id="questionText">Cargando pregunta...</div>
        <div id="questionImageContainer"></div>
        <div id="optionsContainer" class="mt-4"></div>
        <div id="feedbackContainer" class="mt-4"></div>
        <div class="exam-actions" id="examActions">
          <button class="btn btn-primary" id="submitBtn" onclick="handleSubmit()">Enviar respuesta</button>
          <button class="btn btn-secondary hidden" id="nextBtn" onclick="nextQuestion()">Siguiente →</button>
          <button class="btn btn-success hidden" id="finishBtn" onclick="handleFinish()">Ver resultados 🎉</button>
        </div>
      </div>

      <div id="exitConfirm" class="hidden" style="text-align:center;margin-top:16px;">
        <div class="card" style="max-width:400px;margin:0 auto;">
          <p style="margin-bottom:12px;">¿Seguro que quieres salir? Tu progreso se perderá.</p>
          <div class="flex gap-2" style="justify-content:center;">
            <button class="btn btn-secondary" onclick="hide('#exitConfirm');show('#questionCard')">Continuar</button>
            <button class="btn btn-danger" onclick="exitExam()">Salir</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script>initTheme();</script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/exam.js"></script>
  <script>
    let awaitingNext = false;
    let submittedOptionIds = [];

    async function initExamPage() {
      toggleLoading(true);
      const saved = loadExamState();
      if (!saved || saved.completed) {
        toastError('No hay un examen en curso.');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 500);
        return;
      }
      examState = saved;
      show('#examContent');
      startTimer(updateTimer);
      updateTimer(examState.elapsedSeconds);
      updateProgress();
      renderQuestion();
      toggleLoading(false);
    }

    function renderQuestion() {
      const q = getCurrentQuestion();
      if (!q) {
        $('#questionText').textContent = 'Preparando siguiente ronda...';
        hide('#optionsContainer');
        hide('#submitBtn');
        show('#nextBtn');
        return;
      }
      awaitingNext = false;
      submittedOptionIds = [];

      const totalInCycle = examState.currentCycle.length;
      const qNum = examState.cycleIndex + 1;
      $('#questionNumber').textContent = `Pregunta ${qNum} de ${totalInCycle}`;

      const isMulti = isMultipleCorrect(q);
      const inputType = isMulti ? 'checkbox' : 'radio';
      const groupName = 'option_' + q.id;

      $('#questionText').textContent = q.text;

      const imgContainer = $('#questionImageContainer');
      imgContainer.innerHTML = q.image_url
        ? `<img class="question-image" src="${esc(q.image_url)}" alt="Imagen de la pregunta" loading="lazy">`
        : '';

      const container = $('#optionsContainer');
      container.innerHTML = q.options.map(o => `
        <label class="radio-label" onclick="onOptionClick(this, '${inputType}')">
          <input type="${inputType}" name="${groupName}" value="${o.id}" onchange="updateSubmitBtn()">
          <span>${esc(o.text)}</span>
        </label>
      `).join('');

      hide('#nextBtn'); hide('#finishBtn'); hide('#feedbackContainer');
      show('#submitBtn');
      $('#submitBtn').disabled = true;
      updateProgress();
    }

    function onOptionClick(labelEl, type) {
      if (awaitingNext) return;
      const input = labelEl.querySelector('input');
      if (type === 'radio') {
        labelEl.closest('#optionsContainer').querySelectorAll('.radio-label').forEach(l => l.classList.remove('selected'));
        labelEl.classList.add('selected');
        input.checked = true;
      } else {
        input.checked = !input.checked;
        labelEl.classList.toggle('selected', input.checked);
      }
      updateSubmitBtn();
    }

    function updateSubmitBtn() {
      $('#submitBtn').disabled = $$('#optionsContainer input:checked').length === 0;
    }

    async function handleSubmit() {
      if (awaitingNext) return;
      const checked = $$('#optionsContainer input:checked');
      if (checked.length === 0) return;
      submittedOptionIds = checked.map(c => c.value);

      $$('#optionsContainer input').forEach(i => i.disabled = true);

      const q = examState.currentCycle[examState.cycleIndex];
      const correctIds = (q.options || []).filter(o => o.is_correct).map(o => o.id);
      const isCorrect = arraysEqual(submittedOptionIds.sort(), correctIds.sort());

      $$('#optionsContainer .radio-label').forEach(label => {
        const input = label.querySelector('input');
        const isOptCorrect = correctIds.includes(input.value);
        if (input.checked) label.classList.add(isOptCorrect ? 'correct' : 'incorrect');
        else if (isOptCorrect) label.classList.add('correct');
      });

      if (examState.mode === 'practice') {
        const fb = $('#feedbackContainer');
        if (isCorrect) {
          fb.innerHTML = `<div class="feedback-box correct">✅ ¡Correcto!${q.explanation ? `<div class="explanation">${esc(q.explanation)}</div>` : ''}</div>`;
        } else {
          const correctText = q.options.filter(o => o.is_correct).map(o => o.text).join(', ');
          fb.innerHTML = `<div class="feedback-box incorrect">❌ Incorrecto.${q.explanation ? `<div class="explanation">${esc(q.explanation)}</div>` : `<div class="explanation">Respuesta correcta: <strong>${esc(correctText)}</strong></div>`}</div>`;
        }
        show(fb);
      }

      awaitingNext = true;
      hide('#submitBtn');
      const result = await submitAnswer(submittedOptionIds);

      if (result && result.done) {
        $('#examActions').innerHTML = '';
        show('#finishBtn');
        $('#finishBtn').textContent = `🎉 Ver resultados (${result.score}%)`;
        stopTimer();
        return;
      }

      if (result && result.nextCycle) {
        $('#nextBtn').textContent = `🔄 Siguiente ronda (Ronda ${result.cycleNumber})`;
      }

      show('#nextBtn');
      if (examState.mode === 'exam') setTimeout(() => nextQuestion(), 800);
    }

    function nextQuestion() { awaitingNext = false; renderQuestion(); }

    async function handleFinish() {
      stopTimer();
      const result = await finishExam();
      sessionStorage.setItem('simuexam-last-result', JSON.stringify(result));
      window.location.href = 'results.html';
    }

    function updateProgress() {
      if (!examState) return;
      const pct = examState.totalQuestions > 0 ? Math.round((examState.mastered.size / examState.totalQuestions) * 100) : 0;
      $('#progressFill').style.width = pct + '%';
      $('#progressLabel').textContent = `${examState.mastered.size}/${examState.totalQuestions} dominadas`;
      $('#cycleInfo').textContent = `Ronda ${examState.cycleNumber} · ${examState.mode === 'practice' ? '📖 Práctica' : '🎯 Examen'}`;
    }

    function updateTimer(seconds) { $('#timerDisplay').textContent = '⏱ ' + formatTime(seconds); }

    function confirmExit() { hide('#questionCard'); show('#exitConfirm'); }

    function exitExam() { clearExamState(); stopTimer(); window.location.href = 'dashboard.html'; }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key >= '1' && e.key <= '9') {
        const idx = parseInt(e.key) - 1;
        const labels = $$('#optionsContainer .radio-label');
        if (labels[idx]) labels[idx].click();
      }
      if (e.key === 'Enter' && !$('#submitBtn').disabled) handleSubmit();
      if (e.key === 'ArrowRight' || e.key === 'n') { if (!$('#nextBtn').classList.contains('hidden')) nextQuestion(); }
    });

    checkSession().then(session => {
      if (!session) { window.location.href = 'index.html'; return; }
      $('#userDisplay').textContent = '👤 ' + (session.user?.email || 'usuario');
      initExamPage();
    });
  </script>
</body>
</html>

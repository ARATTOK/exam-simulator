<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SimuExam — Examen</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <link rel="apple-touch-icon" href="logo.svg">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#0F172A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="dashboard.html" class="nav-brand">
        <img src="logo.svg" alt="SimuExam"> SimuExam
      </a>
      <div class="nav-links">
        <button class="nav-link" id="themeToggle" onclick="toggleTheme()" title="Cambiar tema"><i data-lucide="moon"></i></button>
        <button class="nav-link" id="fullscreenBtn" onclick="toggleFullscreen()" title="Pantalla completa"><i data-lucide="maximize"></i></button>
        <span class="nav-link user-info" id="userDisplay"><i data-lucide="user"></i> usuario</span>
        <button class="nav-link logout" onclick="confirmExit()">Salir</button>
      </div>
    </div>
  </nav>

  <div class="loading-center" id="loadingIndicator">
    <div class="spinner"></div>
    <p>Preparando examen...</p>
  </div>

  <button class="fullscreen-exit-btn" id="fullscreenExitBtn" onclick="toggleFullscreen()" title="Salir de pantalla completa"><i data-lucide="minimize"></i></button>

  <div id="examContent" class="hidden">
    <div class="exam-layout">
      <button class="btn btn-secondary exam-side-btn exam-side-prev hidden" id="backBtn" onclick="goBack()"><i data-lucide="chevron-left"></i> Anterior</button>

      <div class="exam-container">
        <div class="exam-progress" id="examProgress">
          <div style="font-weight:700;font-size:0.9rem;white-space:nowrap;" id="progressLabel">0/0</div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width:0%"></div>
          </div>
          <div class="exam-timer" id="timerDisplay"><i data-lucide="clock"></i> 00:00</div>
        </div>

        <div class="text-sm text-muted mb-4 text-center" id="cycleInfo">Ronda 1</div>

        <div class="question-card" id="questionCard">
          <div class="q-header">
            <div class="question-number" id="questionNumber">Pregunta 1</div>
            <button class="flag-btn" id="flagBtn" onclick="toggleFlag()" title="Marcar para revisar"><i data-lucide="flag"></i></button>
          </div>
          <div class="question-text" id="questionText">Cargando pregunta...</div>
          <div id="questionImageContainer"></div>
          <div id="optionsContainer" class="mt-4"></div>
          <div id="feedbackContainer" class="mt-4"></div>
          <div class="exam-actions" id="examActions">
            <button class="btn btn-primary" id="submitBtn" onclick="handleSubmit()">Enviar respuesta</button>
            <button class="btn btn-success hidden" id="finishBtn" onclick="handleFinish()">Ver resultados</button>
          </div>
        </div>
        <div class="flag-summary" id="flagSummary"></div>
      </div>

      <button class="btn btn-secondary exam-side-btn exam-side-next hidden" id="nextBtn" onclick="nextQuestion()">Siguiente <i data-lucide="chevron-right"></i></button>
    </div>
  </div>

  <div id="reviewSection" class="hidden" style="max-width:800px;margin:0 auto;padding:24px 24px 48px;">
    <div class="card" style="margin-bottom:24px;">
      <div class="card-header">
        <span class="card-title"><i data-lucide="clipboard-check"></i> Revisión del examen</span>
      </div>
      <div id="reviewSummary" style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;"></div>
      <div id="reviewFilters" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">
        <button class="btn btn-sm btn-primary review-filter active" data-filter="all" onclick="filterReview('all')">Todas</button>
        <button class="btn btn-sm btn-secondary review-filter" data-filter="flagged" onclick="filterReview('flagged')"><i data-lucide="flag"></i> Marcadas</button>
        <button class="btn btn-sm btn-secondary review-filter" data-filter="wrong" onclick="filterReview('wrong')"><i data-lucide="x-circle"></i> Incorrectas</button>
      </div>
      <div id="reviewList"></div>
      <div style="text-align:center;margin-top:24px;">
        <button class="btn btn-primary btn-lg" onclick="submitFinalResults()"><i data-lucide="send"></i> Enviar resultado final</button>
      </div>
    </div>
  </div>

  <div id="exitModal" class="modal-overlay">
    <div class="modal" style="max-width:400px;">
      <div class="modal-header">
        <h3>¿Salir del examen?</h3>
        <button class="modal-close" onclick="hide('#exitModal');show('#questionCard')"><i data-lucide="x"></i></button>
      </div>
      <p style="margin-bottom:8px;color:var(--text-secondary);">Tu progreso se perderá.</p>
      <div id="exitModalProgress" style="margin-bottom:16px;"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="hide('#exitModal');show('#questionCard')">Continuar examen</button>
        <button class="btn btn-danger" onclick="exitExam()">Salir</button>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script>initTheme();</script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>initIcons();</script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/exam.js"></script>
  <script>
    let awaitingNext = false;
    let submittedOptionIds = [];

    async function initExamPage() {
      toggleLoading(true);
      const saved = loadExamState();
      if (!saved || saved.completed) {
        toastError('No hay un examen en curso.');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 500);
        return;
      }
      examState = saved;
      if (!examState.flagged) examState.flagged = {};
      show('#examContent');
      startTimer(updateTimer);
      updateTimer(examState.elapsedSeconds);
      updateProgress();
      renderQuestion();
      toggleLoading(false);
    }

    function toggleFlag() {
      if (!examState) return;
      var q = examState.currentCycle[examState.cycleIndex];
      if (!q) return;
      if (!examState.flagged) examState.flagged = {};
      if (examState.flagged[q.id]) {
        delete examState.flagged[q.id];
      } else {
        examState.flagged[q.id] = true;
      }
      saveExamState();
      updateFlagState();
    }

    function updateFlagState() {
      if (!examState) return;
      var q = examState.currentCycle[examState.cycleIndex];
      var btn = $('#flagBtn');
      if (!q || !btn) return;
      if (examState.flagged && examState.flagged[q.id]) {
        btn.classList.add('flagged');
        btn.innerHTML = '<i data-lucide="flag" class="flagged-icon"></i>';
      } else {
        btn.classList.remove('flagged');
        btn.innerHTML = '<i data-lucide="flag"></i>';
      }
      initIcons();
      var flaggedCount = examState.flagged ? Object.keys(examState.flagged).length : 0;
      var summary = $('#flagSummary');
      if (flaggedCount > 0) {
        summary.innerHTML = '<i data-lucide="flag"></i> ' + flaggedCount + ' pregunta' + (flaggedCount > 1 ? 's' : '') + ' marcada' + (flaggedCount > 1 ? 's' : '');
        summary.classList.add('has-flags');
        initIcons();
      } else {
        summary.textContent = '';
        summary.classList.remove('has-flags');
      }
    }

    function goBack() {
      if (examState.cycleIndex > 0) {
        examState.cycleIndex--;
        awaitingNext = false;
        renderQuestion();
        updateProgress();
      }
    }

    function renderQuestion() {
      const q = getCurrentQuestion();
      if (!q) {
        $('#questionText').textContent = 'Preparando siguiente ronda...';
        hide('#optionsContainer');
        hide('#submitBtn');
        hide('#backBtn');
        show('#nextBtn');
        return;
      }
      awaitingNext = false;
      submittedOptionIds = [];

      const totalInCycle = examState.currentCycle.length;
      const qNum = examState.cycleIndex + 1;
      $('#questionNumber').textContent = 'Pregunta ' + qNum + ' de ' + totalInCycle;

      // Preserve line breaks and formatting (handle both \n literal and actual newlines)
      var questionHtml = esc(q.text).replace(/\\n/g, '\n').replace(/\n/g, '<br>');
      $('#questionText').innerHTML = questionHtml;

      const imgContainer = $('#questionImageContainer');
      imgContainer.innerHTML = q.image_url
        ? '<img class="question-image" src="' + esc(q.image_url) + '" alt="Imagen de la pregunta" loading="lazy">'
        : '';

      var badge = isMultipleCorrect(q)
        ? '<span class="badge badge-multi">Selección múltiple</span>'
        : '<span class="badge badge-single">Una respuesta</span>';

      var container = $('#optionsContainer');
      container.innerHTML = '<div class="options-header">' + badge + '</div>'
        + (q.options || []).map(function(o, i) {
          return '<div class="radio-label" data-opt-id="' + o.id + '" onclick="onOptionClick(this,\'' + (isMultipleCorrect(q) ? 'checkbox' : 'radio') + '\',\'option_' + q.id + '\')">'
            + '<input type="' + (isMultipleCorrect(q) ? 'checkbox' : 'radio') + '" name="option_' + q.id + '" value="' + o.id + '" aria-label="' + esc(o.text) + '">'
            + '<span class="option-number">' + (i + 1) + '</span>'
            + '<span class="option-indicator"></span>'
            + '<span class="option-text">' + esc(o.text).replace(/\\n/g, '\n').replace(/\n/g, '<br>') + '</span>'
            + '</div>';
        }).join('');

      hide('#nextBtn'); hide('#finishBtn'); hide('#feedbackContainer');
      show('#submitBtn');
      $('#submitBtn').disabled = true;
      
      // Show back button if not first question
      if (examState.cycleIndex > 0) show('#backBtn');
      else hide('#backBtn');
      
      updateFlagState();
      updateProgress();
      initIcons();
    }

    function onOptionClick(labelEl, type, groupName) {
      if (awaitingNext) return;
      var input = labelEl.querySelector('input');
      if (type === 'radio') {
        var container = labelEl.closest('#optionsContainer');
        var allLabels = container.querySelectorAll('.radio-label');
        for (var i = 0; i < allLabels.length; i++) allLabels[i].classList.remove('selected');
        labelEl.classList.add('selected');
        input.checked = true;
      } else {
        input.checked = !input.checked;
        if (input.checked) {
          labelEl.classList.add('selected');
        } else {
          labelEl.classList.remove('selected');
        }
      }
      updateSubmitBtn();
    }

    function updateSubmitBtn() {
      var checked = $$('#optionsContainer input:checked');
      $('#submitBtn').disabled = checked.length === 0;
    }

    async function handleSubmit() {
      if (awaitingNext) return;
      var checked = $$('#optionsContainer input:checked');
      if (checked.length === 0) return;
      submittedOptionIds = [];
      for (var i = 0; i < checked.length; i++) submittedOptionIds.push(checked[i].value);

      var inputs = $$('#optionsContainer input');
      for (var i = 0; i < inputs.length; i++) inputs[i].disabled = true;

      var q = examState.currentCycle[examState.cycleIndex];
      var correctIds = [];
      if (q.options) {
        for (var i = 0; i < q.options.length; i++) {
          if (q.options[i].is_correct) correctIds.push(q.options[i].id);
        }
      }
      var sortedSubmitted = submittedOptionIds.slice().sort();
      var sortedCorrect = correctIds.slice().sort();
      var isCorrect = arraysEqual(sortedSubmitted, sortedCorrect);

      var labels = $$('#optionsContainer .radio-label');
      for (var i = 0; i < labels.length; i++) {
        var input = labels[i].querySelector('input');
        var isOptCorrect = correctIds.indexOf(input.value) !== -1;
        if (input.checked) labels[i].classList.add(isOptCorrect ? 'correct' : 'incorrect');
        else if (isOptCorrect) labels[i].classList.add('correct');
      }

      if (examState.mode === 'practice') {
        var fb = $('#feedbackContainer');
        if (isCorrect) {
          fb.innerHTML = '<div class="feedback-box correct">✅ ¡Correcto!' + (q.explanation ? '<div class="explanation">' + esc(q.explanation) + '</div>' : '') + '</div>';
        } else {
          var correctText = [];
          if (q.options) {
            for (var i = 0; i < q.options.length; i++) {
              if (q.options[i].is_correct) correctText.push(q.options[i].text);
            }
          }
          fb.innerHTML = '<div class="feedback-box incorrect">❌ Incorrecto.' + (q.explanation ? '<div class="explanation">' + esc(q.explanation) + '</div>' : '<div class="explanation">Respuesta correcta: <strong>' + esc(correctText.join(', ')) + '</strong></div>') + '</div>';
        }
        show(fb);
      }

      awaitingNext = true;
      hide('#submitBtn');
      var result = await submitAnswer(submittedOptionIds);

      if (result && result.done) {
        $('#examActions').innerHTML = '';
        show('#finishBtn');
        $('#finishBtn').innerHTML = 'Ver resultados (' + result.score + '%)';
        stopTimer();
        return;
      }

      if (examState.mode === 'exam') {
        if (result && result.nextCycle) {
          $('#nextBtn').innerHTML = 'Siguiente ronda (Ronda ' + result.cycleNumber + ') <i data-lucide="chevron-right"></i>';
        } else {
          $('#nextBtn').innerHTML = 'Siguiente <i data-lucide="chevron-right"></i>';
        }
        initIcons();
        show('#nextBtn');
      } else {
        if (result && result.nextCycle) {
          $('#nextBtn').innerHTML = 'Siguiente ronda (Ronda ' + result.cycleNumber + ') <i data-lucide="chevron-right"></i>';
        }
        show('#nextBtn');
      }
    }

    function nextQuestion() { awaitingNext = false; renderQuestion(); }

    async function handleFinish() {
      stopTimer();
      var result = await finishExam();
      examResult = result;
      showReviewSection(result);
    }

    var examResult = null;

    function showReviewSection(result) {
      hide('#examContent');
      hide('#backBtn');
      hide('#nextBtn');
      var section = $('#reviewSection');
      section.classList.remove('hidden');
      initIcons();

      var correct = result.correct || 0;
      var total = result.total || 0;
      var flagged = result.flagged || [];
      var incorrect = total - correct;
      var score = result.score || 0;

      $('#reviewSummary').innerHTML = `
        <div class="review-stat-card"><div class="review-stat-value" style="color:var(--success);">${correct}</div><div class="review-stat-label">Correctas</div></div>
        <div class="review-stat-card"><div class="review-stat-value" style="color:var(--error);">${incorrect}</div><div class="review-stat-label">Incorrectas</div></div>
        <div class="review-stat-card"><div class="review-stat-value" style="color:var(--warning);">${flagged.length}</div><div class="review-stat-label">Marcadas</div></div>
        <div class="review-stat-card"><div class="review-stat-value">${score}%</div><div class="review-stat-label">Puntuación</div></div>
      `;

      renderReviewList(result.allQuestions, result.mastered, result.flagged, 'all');
      initIcons();
    }

    function renderReviewList(allQuestions, mastered, flagged, filter) {
      var list = $('#reviewList');
      var html = '';
      var idx = 0;
      for (var i = 0; i < allQuestions.length; i++) {
        var q = allQuestions[i];
        var isMastered = mastered.has(q.id);
        var isFlagged = flagged && flagged.find(function(f) { return f.id === q.id; });
        var status = isMastered ? 'correct' : 'incorrect';
        if (isFlagged && !isMastered) status = 'flagged';

        if (filter === 'flagged' && !isFlagged) continue;
        if (filter === 'wrong' && isMastered) continue;

        idx++;
        html += '<div class="review-item ' + status + '">';
        html += '<div class="review-q-num">Q' + idx + '</div>';
        html += '<div class="review-q-text">' + (q.text || q.question_text || '').substring(0, 150) + ((q.text || q.question_text || '').length > 150 ? '...' : '') + '</div>';
        html += '<div class="review-q-status ' + status + '">';
        if (isMastered) html += 'Correcta';
        else if (isFlagged) html += '<i data-lucide="flag"></i> Marcada';
        else html += 'Incorrecta';
        html += '</div></div>';
      }
      list.innerHTML = html || '<div class="text-muted text-sm" style="padding:16px;text-align:center;">No hay preguntas para este filtro.</div>';
      initIcons();
    }

    function filterReview(filter) {
      if (!examResult) return;
      $$('.review-filter').forEach(function(b) { b.classList.toggle('active', b.dataset.filter === filter); b.classList.toggle('btn-primary', b.dataset.filter === filter); b.classList.toggle('btn-secondary', b.dataset.filter !== filter); });
      renderReviewList(examResult.allQuestions, examResult.mastered, examResult.flagged, filter);
    }

    function updateProgress() {
      if (!examState) return;
      var pct = examState.totalQuestions > 0 ? Math.round((examState.mastered.size / examState.totalQuestions) * 100) : 0;
      $('#progressFill').style.width = pct + '%';
      $('#progressLabel').textContent = examState.mastered.size + '/' + examState.totalQuestions + ' dominadas';
      $('#cycleInfo').textContent = 'Ronda ' + examState.cycleNumber + ' · ' + (examState.mode === 'practice' ? 'Práctica' : 'Examen');
    }

    function updateTimer(seconds) { $('#timerDisplay').innerHTML = '<i data-lucide="clock"></i> ' + formatTime(seconds); initIcons(); }

    function confirmExit() {
      var progress = examState ? examState.mastered.size + '/' + examState.totalQuestions + ' preguntas dominadas' : '';
      $('#exitModalProgress').textContent = progress;
      show('#exitModal');
      initIcons();
    }

    function exitExam() { clearExamState(); stopTimer(); window.location.href = 'dashboard.html'; }

    function toggleFullscreen() {
      if (document.fullscreenElement || document.webkitFullscreenElement) {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
      } else {
        var el = document.documentElement;
        if (el.requestFullscreen) el.requestFullscreen();
        else if (el.requestFullscreen) el.webkitRequestFullscreen();
      }
    }

    document.addEventListener('fullscreenchange', updateFullscreenState);
    document.addEventListener('webkitfullscreenchange', updateFullscreenState);
    function updateFullscreenState() {
      var isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
      document.body.classList.toggle('fullscreen', isFs);
      var navBtn = $('#fullscreenBtn');
      if (navBtn) {
        navBtn.innerHTML = isFs ? '<i data-lucide="minimize"></i>' : '<i data-lucide="maximize"></i>';
        navBtn.title = isFs ? 'Salir de pantalla completa' : 'Pantalla completa';
      }
      initIcons();
    }

    document.addEventListener('keydown', function(e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key >= '1' && e.key <= '9') {
        var idx = parseInt(e.key) - 1;
        var labels = $$('#optionsContainer .radio-label');
        if (labels[idx]) { labels[idx].click(); e.preventDefault(); }
      }
      if (e.key === 'Enter') {
        if (!$('#submitBtn').disabled) { handleSubmit(); e.preventDefault(); }
        else if (!$('#nextBtn').classList.contains('hidden')) { nextQuestion(); e.preventDefault(); }
      }
      if (e.key === 'b' && !$('#backBtn').classList.contains('hidden')) {
        goBack();
        e.preventDefault();
      }
      if ((e.key === 'ArrowRight' || e.key === 'n') && !$('#nextBtn').classList.contains('hidden')) {
        nextQuestion(); e.preventDefault();
      }
    });

    checkSession().then(function(session) {
      if (!session) { window.location.href = 'index.html'; return; }
      $('#userDisplay').innerHTML = '<i data-lucide="user"></i> ' + (session.user?.email || 'usuario');
      initIcons();
      initExamPage();
    });
  </script>
</body>
</html>

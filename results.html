<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SimuExam — Resultados</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>📝</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="dashboard.html" class="nav-brand">
        <img src="logo.svg" alt="SimuExam"> SimuExam
      </a>
      <div class="nav-links">
        <span class="nav-link user-info" id="userDisplay">👤 usuario</span>
        <a href="dashboard.html" class="nav-link">← Volver al dashboard</a>
      </div>
    </div>
  </nav>

  <div class="loading-center" id="loadingIndicator">
    <div class="spinner"></div>
    <p>Cargando resultados...</p>
  </div>

  <div id="resultsContent" class="hidden">
    <div class="container" style="max-width:700px;">
      <div class="results-hero">
        <div class="results-score-circle" id="scoreCircle">0%</div>
        <div class="results-label" id="resultsTitle">Examen completado</div>
        <div class="results-sub" id="resultsSub">Revisa tu rendimiento</div>

        <div class="results-stats">
          <div class="stat-card">
            <div class="stat-value" id="statCorrect">0</div>
            <div class="stat-label">Aciertos</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="statTotal">0</div>
            <div class="stat-label">Total preguntas</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="statTime">00:00</div>
            <div class="stat-label">Tiempo</div>
          </div>
        </div>
      </div>

      <div style="text-align:center;margin-bottom:24px;">
        <a href="dashboard.html" class="btn btn-primary">📋 Ir al dashboard</a>
        <button class="btn btn-secondary" onclick="window.location.href='exam.html'" id="retryBtn" style="display:none;">🔄 Reintentar</button>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">📋 Detalle del examen</span>
          <span id="modeBadge"></span>
        </div>
        <div id="resultsDetail">
          <div class="text-muted text-sm" style="padding:12px;">No hay detalle disponible.</div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    async function loadResults() {
      toggleLoading(true);

      let result = null;
      const stored = sessionStorage.getItem('simuexam-last-result');
      if (stored) {
        result = JSON.parse(stored);
        sessionStorage.removeItem('simuexam-last-result');
      } else {
        try {
          const exam = await apiGet('/api/exams/last');
          if (exam) {
            result = {
              score: exam.score,
              correct: exam.correct_answers,
              total: exam.total_questions,
              time: exam.completed_at ? Math.floor((new Date(exam.completed_at) - new Date(exam.started_at)) / 1000) : 0,
              mode: 'exam',
              done: true,
            };
          }
        } catch (err) { console.error(err); }
      }

      if (!result) {
        alert('No hay resultados disponibles.');
        window.location.href = 'dashboard.html';
        return;
      }

      renderResults(result);
      toggleLoading(false);
      show('#resultsContent');
    }

    function renderResults(result) {
      const score = result.score || 0;
      const total = result.total || 0;
      const correct = result.correct || 0;

      const circle = $('#scoreCircle');
      circle.textContent = score + '%';
      circle.className = 'results-score-circle';
      if (score === 100) circle.classList.add('perfect');
      else if (score < 50) circle.classList.add('fail');

      if (score === 100) {
        $('#resultsTitle').textContent = '🎉 ¡Perfecto! Todas dominadas';
        $('#resultsSub').textContent = 'Dominaste todas las preguntas. ¡Excelente trabajo!';
      } else if (score >= 70) {
        $('#resultsTitle').textContent = '🌟 ¡Muy bien!';
        $('#resultsSub').textContent = 'Buen rendimiento. Sigue practicando para mejorar.';
      } else if (score >= 40) {
        $('#resultsTitle').textContent = '💪 Vas por buen camino';
        $('#resultsSub').textContent = 'Sigue practicando las preguntas que fallaste.';
      } else {
        $('#resultsTitle').textContent = '📚 Sigue estudiando';
        $('#resultsSub').textContent = 'Revisa las respuestas correctas y vuelve a intentarlo.';
      }

      $('#statCorrect').textContent = correct;
      $('#statTotal').textContent = total;
      $('#statTime').textContent = formatTime(result.time || 0);

      $('#modeBadge').innerHTML = result.mode === 'practice'
        ? '<span class="badge badge-success">📖 Modo práctica</span>'
        : '<span class="badge badge-primary">🎯 Modo examen</span>';

      if (score < 100 && total > 0) show('#retryBtn');

      $('#resultsDetail').innerHTML = `
        <div style="padding:12px;text-align:center;color:var(--text-secondary);">
          <p style="font-size:1.1rem;margin-bottom:8px;">${result.mode === 'practice' ? '📖 Modo práctica' : '🎯 Modo examen'}</p>
          <p>Completaste <strong>${total}</strong> preguntas</p>
          <p class="text-sm">Acertaste <strong>${correct}</strong> (${score}%)</p>
          <p class="text-sm">Tiempo total: <strong>${formatTime(result.time || 0)}</strong></p>
        </div>
      `;
    }

    checkSession().then(session => {
      if (!session) { window.location.href = 'index.html'; return; }
      $('#userDisplay').textContent = '👤 ' + (session.user?.email || 'usuario');
      loadResults();
    });
  </script>
</body>
</html>
